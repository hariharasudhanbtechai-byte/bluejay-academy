<section class="py-5 bg-light">
  <div class="container">

    <div class="row align-items-center">

      <!-- Left Content -->
      <div class="col-lg-6 mb-4">

        <h2 class="fw-bold text-primary mb-3">
          Join Our Family
        </h2>

        <h5 class="fw-bold text-primary mt-4">
          Age Criteria
        </h5>
        <p class="text-muted">
          We welcome children aged 2–5 years old.
        </p>

        <h5 class="fw-bold text-primary mt-4">
          Admission Process
        </h5>

        <ul class="list-unstyled text-muted">
          <li class="mb-2">📝 Submit inquiry form</li>
          <li class="mb-2">🏫 Schedule a school visit</li>
          <li class="mb-2">📋 Complete application</li>
          <li class="mb-2">✅ Welcome to our family!</li>
        </ul>

      </div>

      <!-- Form -->
      <div class="col-lg-6">
        <div class="card shadow-sm border-0 p-4">

          <h4 class="fw-bold mb-3 text-center">
            Inquiry Form
          </h4>

          <form>

            <div class="mb-3">
              <label for="parentName" class="form-label">Parent Name</label>
              <input type="text" class="form-control" id="parentName" required>
            </div>

            <div class="mb-3">
              <label for="childName" class="form-label">Child Name</label>
              <input type="text" class="form-control" id="childName" required>
            </div>

            <div class="mb-3">
              <label for="age" class="form-label">Child Age</label>
              <input type="number" class="form-control" id="age" min="2" max="5" required>
            </div>

            <div class="mb-3">
              <label for="contact" class="form-label">Contact Number</label>
              <input type="tel" class="form-control" id="contact" placeholder="+91 90922 83033" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Submit Inquiry
            </button>

          </form>

        </div>
      </div>

    </div>

  </div>
</section>
